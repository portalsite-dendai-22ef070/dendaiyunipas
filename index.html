<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生ポータルサイト DENDAI-UNIPA</title>
    <style>
        /* CSSはさっきと全く同じだから安心していれてね！ */
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f4f5f9; color: #333; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 412px; background-color: #f4f5f9; padding: 20px; box-sizing: border-box; }
        .logo-area { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        .logo-tdu { font-size: 32px; font-weight: bold; color: #005bac; display: inline-block; vertical-align: middle; margin-right: 10px; }
        .logo-text { display: inline-block; vertical-align: middle; text-align: left; }
        .logo-subtitle { font-size: 11px; font-weight: bold; color: #333; margin: 0; }
        .logo-title { font-size: 16px; font-weight: bold; color: #111; margin: 2px 0 0 0; }
        .logo-subbrand { text-align: center; margin-top: 10px; font-size: 14px; font-weight: bold; color: #003366; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-input { width: 100%; padding: 14px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; box-sizing: border-box; text-align: center; }
        .password-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #0076e4; font-size: 16px; cursor: pointer; }
        .login-options { display: flex; justify-content: center; align-items: center; margin-top: 20px; margin-bottom: 25px; color: #005bac; font-size: 15px; font-weight: bold; }
        .login-options input { margin-left: 10px; width: 18px; height: 18px; }
        .btn-login { width: 100%; padding: 14px; background-color: #1a65cc; color: white; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .pc-link { text-align: center; margin: 20px 0; }
        .pc-link a { color: #005bac; text-decoration: none; font-size: 15px; font-weight: bold; }
        .info-box { background-color: #fff; border-radius: 8px; padding: 20px; font-size: 14px; line-height: 1.6; }
        .alert-text { color: #b32424; font-weight: bold; margin-bottom: 25px; }
        .section-title { font-size: 15px; font-weight: bold; margin-top: 20px; margin-bottom: 5px; }
        .section-title::before { content: "■"; margin-right: 5px; }
        .text-block { margin-bottom: 15px; }
        .info-list { padding-left: 20px; }
        .bold-red { color: #b32424; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <div class="logo-area">
        <div>
            <span class="logo-tdu">TDU</span>
            <div class="logo-text">
                <p class="logo-subtitle">学生ポータルサイト</p>
                <p class="logo-title">DENDAI-UNIPA</p>
            </div>
        </div>
        <div class="logo-subbrand">UNIVERSAL PASSPORT <span style="color:#cc0000;">RX</span></div>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <input type="text" id="userId" class="form-input" placeholder="User ID">
        </div>
        <div class="form-group">
            <input type="password" id="password" class="form-input" placeholder="Password">
            <span class="password-eye">👁</span>
        </div>

        <div class="login-options">
            <span>自動ログイン情報を保存する</span>
            <input type="checkbox">
        </div>

        <button type="submit" class="btn-login">LOGIN</button>
    </form>

    <div class="pc-link"><a href="#">ＰＣはこちら</a></div>

    <div class="info-box">
        <div class="alert-text">&lt;システムメンテナンスのお知らせ&gt;<br>サービス停止時間：深夜3時00分～5時30分</div>
    </div>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); // 画面が勝手にリロードされるのを防ぐよ！

        // 入力された文字をゲット！
        const userInput = document.getElementById('userId').value;
        const passInput = document.getElementById('password').value;

        // 正解のIDとパスワードを設定
        const correctUser = "tdu2026";
        const correctPass = "unipa123";

        // 判定スタート！
        if (userInput === correctUser && passInput === correctPass) {
            // success.html に画面を切り替えるよ！
            window.location.href = "success.html"; 
        } else {
            alert('❌ ユーザーIDまたはパスワードが違います！');
        }
    }); // 👈 💥ここ！前のコードはここの「 }); 」が抜けてたの！本当にごめんね！
</script>

</body>
</html>
