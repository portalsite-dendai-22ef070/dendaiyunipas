<script>
    const today = new Date();

    // 基準日表示を今日の日付に自動で書き換えるよ！
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('today-standard-date').textContent = `${yyyy}/${mm}/${dd}`;

    // 出席率をリアルタイム＆分母可変で計算する共通魔法関数！
    function calculateLiveRate(dateArray) {
        let attend = 0;
        let past = 0;

        dateArray.forEach(dStr => {
            const classDate = new Date(dStr);
            
            // 判定1：授業の「翌日」を迎えているなら出席（〇）カウント
            const nextDay = new Date(classDate);
            nextDay.setDate(nextDay.getDate() + 1);
            if (today >= nextDay) {
                attend++;
            }

            // 判定2：授業当日の「23:59:59」を過ぎていたら実施済み（分母）カウント
            const classEnd = new Date(classDate);
            classEnd.setHours(23, 59, 59, 999);
            if (today > classEnd) {
                past++;
            }
        });

        return past > 0 ? Math.round((attend / past) * 100) + '%' : '%';
    }

    // 🗓 各科目のPDF年間スケジュールに基づく日付データ配列

    // 2. 機構学 (火2・5/5休講スキップ)

    const dates7 = [...dates6];

    // 8. 先端機械設計製図I (木1木2・スキップなし全14回)
    const dates8 = [

        "2026-06-04", "2026-06-11", "2026-06-18", "2026-06-25", "2026-07-02", "2026-07-09",

    // 10. 制御工学I (金1・4/10開始、5/1振替休校スキップ全14回)
    const dates10 = [

    // 11. 材料力学Iおよび演習 (金3金4・制御工学と同スケジュール)

    // 💥 画面に計算結果を反映！(1番と9番の実習科目は計算をせず、固定で0%を代入！)

    document.getElementById('rate-8').textContent = calculateLiveRate(dates8);
    document.getElementById('rate-9').textContent = '0%';

    document.getElementById('rate-11').textContent = calculateLiveRate(dates11);

    // ⏰ 5分放置で警告画面（timeout.html）に飛ばすセキュリティ機能
    (function() {
        const TIMEOUT_DURATION = 300000; 
        let logoutTimer;

        function resetLogoutTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(function() {
                window.location.href = 'timeout.html';
            }, TIMEOUT_DURATION);
        }

        window.addEventListener('touchstart', resetLogoutTimer);
        window.addEventListener('click', resetLogoutTimer);

    })();
