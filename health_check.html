<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康診断情報照会</title>
    <style>
        /* 全体の基本スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f5f9;
            color: #333;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* スマホサイズ固定コンテナ */
        .container {
            width: 100%;
            max-width: 412px;
            background-color: #ffffff; /* データ表示エリアは基本白ベース */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            padding-bottom: 40px; /* 💥ボトムバーが消えたので、程よい余白に調整したよ！ */
        }

        /* 🟦 本物のUNIPAカラーヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background-color: #1a65cc;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-title {
            font-size: 16px;
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
            margin-left: 50px;
        }
        .menu-btn-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .menu-icon {
            font-size: 18px;
            line-height: 1;
        }
        .menu-text {
            font-size: 9px;
            margin-top: 1px;
            font-weight: bold;
        }

        /* 🔎 上部のプルダウン選択エリア */
        .select-area {
            padding: 15px;
            background-color: #f4f5f9;
            border-bottom: 1px solid #dcdcdc;
        }
        .select-box {
            width: 100%;
            padding: 12px 15px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            color: #333;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M0 3l5 5 5-5z' fill='%231a65cc'/></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 12px;
            box-sizing: border-box;
        }

        /* 📋 健康診断情報のタイトル */
        .info-main-title {
            padding: 12px 15px 6px 15px;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            background-color: #ffffff;
        }

        /* 📊 UNIPA風 縦並び1カラムリスト構造 */
        .list-container {
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }
        .list-row {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #e2e7f0;
            font-size: 13px;
            box-sizing: border-box;
        }
        .row-label {
            background-color: #eef4fc; /* 👈 薄ブルーの項目背景 */
            color: #333333;
            padding: 6px 15px;
            font-size: 13px;
        }
        .row-value {
            padding: 8px 15px;
            color: #555555;
            background-color: #ffffff;
            min-height: 36px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        /* ⚙️ サイドメニュー（ドロワー） */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 100;
            display: none;
        }
        .side-menu {
            position: fixed;
            top: 0; right: -100%; width: 85%; height: 100%;
            background-color: #ffffff;
            z-index: 101;
            box-sizing: border-box;
            transition: right 0.3s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .side-menu.open { right: 0; }
        
        .nav-blue-item {
            background-color: #1a65cc; color: white; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; font-size: 15px; font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .nav-blue-item div { display: flex; align-items: center; gap: 10px; }
        
        .menu-category-title {
            color: #1a65cc; font-size: 14px; font-weight: bold;
            padding: 15px 20px 5px 20px; background-color: #fff;
        }
        .menu-link-item {
            padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; color: #333; font-size: 14px; border-bottom: 1px solid #f0f0f0; padding-left: 35px;
            background-color: #fff;
        }
        .menu-arrow { color: #1a65cc; font-weight: bold; font-size: 14px; }
        
        .menu-blue-bar {
            background-color: #1a65cc; color: white; padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            text-decoration: none; font-size: 14px; font-weight: bold; margin-top: 10px;
        }
        .logout-area { padding: 20px; padding-bottom: 80px; text-align: center; background-color: #fff; }
        .btn-logout {
            display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%;
            padding: 12px; border: 2px solid #1a65cc; border-radius: 25px; background-color: white;
            color: #1a65cc; font-size: 15px; font-weight: bold; text-decoration: none; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-title">健康診断情報照会</div>
        <div class="menu-btn-area" id="menuOpenBtn">
            <span class="menu-icon">☰</span>
            <span class="menu-text">メニュー</span>
        </div>
    </div>

    <div class="select-area">
        <select class="select-box">
            <option>2026年度 前期 1回目</option>
        </select>
    </div>

    <div class="info-main-title">健康診断情報_千住</div>

    <div class="list-container">
        <div class="list-row"><div class="row-label">実施年度</div><div class="row-value">2026</div></div>
        <div class="list-row"><div class="row-label">受診回数</div><div class="row-value">1</div></div>
        <div class="list-row"><div class="row-label">検査日</div><div class="row-value">2026/03/25</div></div>
        <div class="list-row"><div class="row-label">再検査指示フラグ</div>
