<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルトップ</title>
    <style>
        /* 全体のスタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f5f9;
            color: #333;
            display: flex;
            justify-content: center;
        }

        /* スマホサイズに固定するコンテナ */
        .container {
            width: 100%;
            max-width: 412px;
            background-color: #f4f5f9;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ヘッダー部分 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #f4f5f9;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
            margin-left: 40px; /* アイコンとのバランス調整 */
        }
        .header-icons {
            display: flex;
            gap: 15px;
        }
        .icon-btn {
            font-size: 20px;
            cursor: pointer;
        }

        /* メインコンテンツ（上の白いエリア） */
        .top-content {
            padding: 10px 20px 20px 20px;
            position: relative;
        }
        .today-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 15px 0;
            letter-spacing: 0.5px;
        }

        /* イラストの配置（右上） */
        .illustration {
            position: absolute;
            right: 20px;
            top: -10px;
            width: 110px;
            height: auto;
        }

        /* カードが並ぶエリア */
        .dashboard-grid {
            display: flex;
            gap: 15px;
        }

        /* 左側の日付カード */
        .date-card {
            background-color: #fff;
            border-radius: 16px;
            width: 100px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .date-year {
            font-size: 14px;
            color: #888;
            margin-bottom: 2px;
        }
        .date-day {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .date-week {
            font-size: 28px;
            font-weight: bold;
        }

        /* 右側のメニューリンクカード */
        .menu-card {
            background-color: #fff;
            border-radius: 16px;
            flex-grow: 1;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .menu-item {
            display: flex;
            align-items: center;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            position: relative;
        }
        .menu-icon {
            margin-right: 8px;
            font-size: 16px;
        }
        /* お知らせの赤い丸通知 */
        .badge::after {
            content: "";
            position: absolute;
            left: 12px;
            top: -2px;
            width: 6px;
            height: 6px;
            background-color: #ff4d4d;
            border-radius: 50%;
        }

        /* 下の青いスケジュールエリア */
        .schedule-area {
            background-color: #0066cc;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 20px;
            flex-grow: 1;
            color: white;
        }

        /* スケジュールヘッダー（切り替えスイッチなど） */
        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        /* 日・週のトグルスイッチ風 */
        .toggle-switch {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2px;
            display: flex;
        }
        .toggle-btn {
            padding: 4px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
        }
        .toggle-btn.active {
            background-color: white;
            color: #0066cc;
        }
        .toggle-btn.inactive {
            color: white;
        }

        /* 日付ナビゲーション */
        .date-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-today {
            background-color: white;
            color: #0066cc;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .nav-arrow {
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-current-date {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .nav-calendar-icon {
            font-size: 18px;
            cursor: pointer;
        }

        /* 「本日の予定はありません」のボックス */
        .empty-schedule-box {
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-title">ポータルトップ</div>
        <div class="header-icons">
            <span class="icon-btn">📅</span>
            <span class="icon-btn">☰</span>
        </div>
    </div>

    <div class="top-content">
        <h2 class="today-title">TODAY</h2>
        
        <div class="illustration" style="font-size: 35px; text-align: right; line-height: 1;">
            👩‍🦰☕️👨
        </div>

        <div class="dashboard-grid">
            <div class="date-card">
                <div class="date-year">2026</div>
                <div class="date-day">6/7</div>
                <div class="date-week">日</div>
            </div>

            <div class="menu-card">
                <a href="#" class="menu-item badge"><span class="menu-icon">📨</span> お知らせ</a>
                <a href="#" class="menu-item"><span class="menu-icon">📖</span> シラバス照会</a>
                <a href="#" class="menu-item"><span class="menu-icon">📊</span> 成績照会</a>
            </div>
        </div>
    </div>

    <div class="schedule-area">
        <div class="schedule-header">
            <div style="flex-grow: 1;"></div>
            <div class="toggle-switch">
                <div class="toggle-btn active">日</div>
                <div class="toggle-btn inactive">週</div>
            </div>
            <span class="icon-btn" style="margin-left: 15px; font-size: 16px;">↑</span>
        </div>

        <div class="date-nav">
            <div class="nav-today">今日</div>
            <span class="nav-arrow">＜</span>
            <div class="nav-current-date">2026/06/07 日</div>
            <span class="nav-arrow">＞</span>
            <span class="nav-calendar-icon">📅</span>
        </div>

        <div class="empty-schedule-box">
            本日の予定はありません
        </div>
    </div>

</div>

</body>
</html>
